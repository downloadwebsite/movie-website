{% extends 'base.html' %}
{% load static %}

{% block title %}ورود - {{ site_settings.site_name|default:'فیلمولوژی' }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-circle fa-4x text-primary mb-3"></i>
                        <h3 class="fw-bold">ورود به حساب کاربری</h3>
                    </div>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="id_username" class="form-label">نام کاربری</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-user"></i>
                                </span>
                                {{ form.username }}
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="id_password" class="form-label">رمز عبور</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-lock"></i>
                                </span>
                                {{ form.password }}
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="fas fa-sign-in-alt me-2"></i> ورود
                        </button>
                    </form>

                    <div class="text-center">
                        <p class="mb-0">
                            حساب کاربری ندارید؟
                            <a href="{% url 'accounts:register' %}" class="text-primary">ثبت نام کنید</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
